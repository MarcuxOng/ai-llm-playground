name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - preview
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
        
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
        
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build:
    runs-on: ubuntu-latest
    needs: lint
    env:
      BUILDX_NO_DEFAULT_ATTESTATIONS: 1
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          docker system prune -af --volumes 2>/dev/null || true
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ai-llm-playground:ci
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      GEMINI_API_KEY: test-gemini-key
      GROQ_API_KEY: test-groq-key
      OPENROUTER_API_KEY: test-openrouter-key
      MISTRAL_API_KEY: test-mistral-key
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check code structure
        run: |
          python -c "import app.app; print('App imports successfully')"

  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    env:
      GEMINI_API_KEY: test-gemini-key
      GROQ_API_KEY: test-groq-key
      OPENROUTER_API_KEY: test-openrouter-key
      MISTRAL_API_KEY: test-mistral-key
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Run smoke test
        run: |
          docker run -d --name test-container \
            -e GEMINI_API_KEY \
            -e GROQ_API_KEY \
            -e OPENROUTER_API_KEY \
            -e MISTRAL_API_KEY \
            -p 8000:8000 ai-llm-playground:ci

          for i in {1..30}; do
            if curl -fsS --max-time 5 http://localhost:8000/ 2>/dev/null; then
              echo "✓ Container responded successfully"
              exit 0
            fi
            sleep 1
          done

          echo "✗ Smoke test failed: service did not respond in time"
          docker logs test-container
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f test-container 2>/dev/null || true

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ai-llm-playground:ci
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: "1"

  publish:
    runs-on: ubuntu-latest
    needs: [smoke-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          provenance: false
