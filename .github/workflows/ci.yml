name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - preview
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
        
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
        
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  docker:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          docker system prune -af --volumes 2>/dev/null || true
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and load Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ai-llm-playground:ci
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false

      - name: Verify container starts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          # Use shell fallback for empty secrets
          GEMINI_KEY="${GEMINI_API_KEY:-test-key}"
          GROQ_KEY="${GROQ_API_KEY:-test-key}"
          OPENROUTER_KEY="${OPENROUTER_API_KEY:-test-key}"
          MISTRAL_KEY="${MISTRAL_API_KEY:-test-key}"
          OPENWEATHERMAP_KEY="${OPENWEATHERMAP_API_KEY:-test-key}"
          NEWS_KEY="${NEWS_API_KEY:-test-key}"


          docker run -d --name test-container \
            -e GEMINI_API_KEY="$GEMINI_KEY" \
            -e GROQ_API_KEY="$GROQ_KEY" \
            -e OPENROUTER_API_KEY="$OPENROUTER_KEY" \
            -e MISTRAL_API_KEY="$MISTRAL_KEY" \
            -e OPENWEATHERMAP_API_KEY="$OPENWEATHERMAP_KEY" \
            -e NEWS_API_KEY="$NEWS_KEY" \
            -p 8000:8000 ai-llm-playground:ci

          # Wait for container to be ready
          for i in {1..30}; do
            if ! docker ps -q -f name=test-container | grep -q .; then
              echo "Container crashed on startup"
              docker logs test-container
              exit 1
            fi

            if curl -fsS --max-time 5 http://localhost:8000/ 2>/dev/null; then
              echo "Container responded successfully"
              docker rm -f test-container
              exit 0
            fi
            sleep 1
          done

          echo "Container did not respond in time"
          docker logs test-container
          docker rm -f test-container
          exit 1

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check code structure
        run: |
          export GEMINI_API_KEY="${GEMINI_API_KEY:-test-key}"
          export GROQ_API_KEY="${GROQ_API_KEY:-test-key}"
          export OPENROUTER_API_KEY="${OPENROUTER_API_KEY:-test-key}"
          export MISTRAL_API_KEY="${MISTRAL_API_KEY:-test-key}"
          python -c "import app.app; print('App imports successfully')"
